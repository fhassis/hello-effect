# Tempo values
# Chart: grafana/tempo  (single-binary; NOT tempo-distributed)
#
# One pod, local filesystem storage, OTLP receivers on 4317/4318 so Alloy
# can forward traces here.
#
# NOTE: This chart is officially deprecated by Grafana Labs. The replacement,
# `grafana/tempo-distributed`, is microservices-only — even at 1 replica each
# it's 6+ pods. For a learning / non-HA setup the deprecated single-binary
# chart is still the right tradeoff. It continues to receive Tempo app updates
# (chart pinned to current Tempo app versions), just no new chart features.
# Migrate to `grafana/tempo-distributed` when retention/scale demand it, OR
# when this chart stops getting app version bumps — whichever comes first.

tempo:
  # Local filesystem trace storage (no S3/GCS).
  storage:
    trace:
      backend: local
      local:
        path: /var/tempo/traces

  # Enable OTLP receivers — gRPC for app SDKs, HTTP for browsers / curl.
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  # Single-tenant, no auth.
  multitenancyEnabled: false

# Persist traces to a PVC on the default k3s/k3d storage class.
persistence:
  enabled: true
  size: 10Gi
  storageClassName: local-path

# Single-binary chart deploys one StatefulSet pod by default. No replica
# overrides needed.

service:
  type: ClusterIP

# No ServiceMonitor / metrics scraping for now — re-enable when you want
# Tempo's own metrics in Prometheus.
serviceMonitor:
  enabled: false
