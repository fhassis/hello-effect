# Grafana values
# Chart: grafana/grafana
#
# Standalone Grafana. All three datasources pre-wired so the stack is
# query-ready without any manual UI steps after install.

# dev-only: replace per environment (see README "Secrets" section)
adminPassword: admin

persistence:
  enabled: true
  size: 2Gi
  storageClassName: local-path

# The init-chown-data container hits "permission denied" on k3d/k3s
# when chowning a populated PVC. Modern kubelets apply fsGroup, so skip it.
initChownData:
  enabled: false

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        uid: prometheus
        url: http://prometheus-server.observability.svc.cluster.local:80
        isDefault: true
        jsonData:
          timeInterval: 30s

      - name: Loki
        type: loki
        uid: loki
        url: http://loki.observability.svc.cluster.local:3100
        jsonData:
          maxLines: 1000

      - name: Tempo
        type: tempo
        uid: tempo
        url: http://tempo.observability.svc.cluster.local:3200
        jsonData:
          tracesToLogsV2:
            datasourceUid: loki
          lokiSearch:
            datasourceUid: loki
