# kube-prometheus-stack values
# Chart: prometheus-community/kube-prometheus-stack
#
# Single-replica, non-HA. Bundles Prometheus + Grafana + Prometheus Operator
# CRDs (ServiceMonitor / PodMonitor / PrometheusRule) + node-exporter +
# kube-state-metrics. Alertmanager disabled until alerting rules exist.

crds:
  enabled: true

alertmanager:
  enabled: false

# ---------- Grafana ----------
grafana:
  enabled: true
  # dev-only: override per environment (see README "Secrets" section)
  adminPassword: admin

  persistence:
    enabled: true
    type: pvc
    size: 2Gi
    storageClassName: local-path

  # The chart's `init-chown-data` init container hits "permission denied" on
  # k3d/k3s when chowning a populated PVC across upgrades. Modern kubelets
  # apply fsGroup automatically, so this init step is redundant.
  initChownData:
    enabled: false

  # Pick up dashboards dropped in as ConfigMaps with label grafana_dashboard=1
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: ALL
    datasources:
      enabled: true
      label: grafana_datasource
      searchNamespace: ALL
      # Alertmanager is disabled at the chart level; don't auto-create a
      # datasource pointing at a non-existent service.
      alertmanager:
        enabled: false

  # Prometheus datasource is auto-wired by the chart. Add Loki + Tempo so
  # Grafana ships pre-connected to the rest of the stack.
  additionalDataSources:
    - name: Loki
      type: loki
      uid: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      isDefault: false
      jsonData:
        # Wire Loki -> Tempo "Derived field" trace links once apps emit traceID
        # in their log lines. Left empty for now; uncomment when needed.
        # derivedFields:
        #   - name: traceID
        #     matcherRegex: "traceID=(\\w+)"
        #     url: "$${__value.raw}"
        #     datasourceUid: tempo
        maxLines: 1000
    - name: Tempo
      type: tempo
      access: proxy
      # Tempo's HTTP query API (`tempo` chart default).
      url: http://tempo.observability.svc.cluster.local:3200
      isDefault: false
      uid: tempo

# ---------- Prometheus ----------
prometheus:
  prometheusSpec:
    replicas: 1
    retention: 7d
    # Discover ServiceMonitors / PodMonitors across all namespaces, regardless
    # of which Helm release created them. Without these, the Operator only
    # picks up monitors with the chart's own labels.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false
    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 10Gi

# ---------- Bundled exporters (keep defaults; both are tiny) ----------
nodeExporter:
  enabled: true
kubeStateMetrics:
  enabled: true
